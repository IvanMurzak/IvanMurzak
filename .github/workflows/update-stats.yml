name: Update Stats Images

on:
  schedule:
    - cron: '0 0 * * *' # Run daily at midnight UTC
  workflow_dispatch:

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate GitHub Stats
        env:
          # GITHUB_TOKEN can't see private PRs/issues, which undercounts
          # Total PRs / Total Issues. Add a GH_PAT repo secret (classic PAT,
          # scopes: repo + read:user) to get the full numbers.
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
        run: node scripts/generate-stats.js

      - name: Commit and Push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add images/stats images/pins
          git commit -m "Update stats images" || exit 0
          git push
