<svg width="955" height="166" viewBox="0 0 955 166" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Unity-MCP: 3 565 stars, 320 forks, 149.1k downloads.">
  <style>
    .f-eyebrow { font: 600 9px 'Segoe UI', Ubuntu, sans-serif; fill: #0969da; letter-spacing: 1.6px; }
    .f-name { font: 700 22px 'Segoe UI', Ubuntu, sans-serif; fill: #1f2328; }
    .f-desc { font: 400 13px 'Segoe UI', Ubuntu, sans-serif; fill: #656d76; }
    .f-val { font: 600 13px 'Segoe UI', Ubuntu, sans-serif; fill: #1f2328; }
    .f-lab { font: 400 12px 'Segoe UI', Ubuntu, sans-serif; fill: #656d76; }
    #f-shine { animation: sweep 9s linear 3.5s infinite; }
    
    .fade { opacity: 0; animation: fadein .5s ease-out forwards; }
    .chip { opacity: 0; animation: rise .5s ease-out both; }
    .late { opacity: 0; animation: fadein .45s ease-out 1.5s forwards; }
    @keyframes fadein { to { opacity: 1; } }
    @keyframes grow { from { transform: scaleY(0); } to { transform: scaleY(1); } }
    @keyframes rise { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes breathe { from { opacity: .15; } to { opacity: .5; } }
    @keyframes ping { 0% { transform: scale(.5); opacity: .8; } 55% { transform: scale(2.4); opacity: 0; } 100% { transform: scale(2.4); opacity: 0; } }
    @keyframes sweep { 0% { transform: translateX(0) skewX(-14deg); } 22% { transform: translateX(1115px) skewX(-14deg); } 100% { transform: translateX(1115px) skewX(-14deg); } }
  
    @media (prefers-reduced-motion: reduce) {
      .fade, .chip { animation: none; opacity: 1; transform: none; }
      #f-shine { animation: none; display: none; }
    }
  </style>
  <defs>
    <linearGradient id="f-borderGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#d0d7de"/>
      <stop offset="0.5" stop-color="#54aeff"/>
      <stop offset="1" stop-color="#d0d7de"/>
      <animateTransform attributeName="gradientTransform" type="rotate" from="0 0.5 0.5" to="360 0.5 0.5" dur="10s" repeatCount="indefinite"/>
    </linearGradient>
    <linearGradient id="f-shineGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="rgba(255,255,255,0.55)" stop-opacity="0"/>
      <stop offset="0.5" stop-color="rgba(255,255,255,0.55)"/>
      <stop offset="1" stop-color="rgba(255,255,255,0.55)" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="f-cardClip"><rect x="1" y="1" rx="6" width="953" height="148"/></clipPath>
  </defs>
  <rect x="0.75" y="0.75" rx="6" width="953.5" height="148.5" fill="#ffffff" stroke="url(#f-borderGrad)" stroke-width="1.5"/>
