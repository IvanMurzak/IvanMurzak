  <text class="f-desc fade" x="25" y="86" style="animation-delay:.25s">AI Skills, MCP Tools, and CLI for Unity Engine. Full AI develop and test loop. Use cli</text>
  <text class="f-desc fade" x="25" y="103" style="animation-delay:.3s">for quick setup. Efficient token usage, advanced tools. Any C# method may be turned into</text>
