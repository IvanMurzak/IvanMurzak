<svg width="955" height="270" viewBox="0 0 955 270" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Commits per month, last 3 years. Total 7390, average 205 per month, peak 620.">
  <style>
    .m-title { font: 600 18px 'Segoe UI', Ubuntu, sans-serif; fill: #1f2328; }
    .m-sub { font: 400 12px 'Segoe UI', Ubuntu, sans-serif; fill: #656d76; }
    .m-tick { font: 400 10px 'Segoe UI', Ubuntu, sans-serif; fill: #656d76; }
    .m-now { font: 600 9px 'Segoe UI', Ubuntu, sans-serif; fill: #0969da; letter-spacing: 1px; }
    .m-grid { stroke: #eaeef2; stroke-width: 1; }
    .m-sep { stroke: #eaeef2; stroke-width: 1; stroke-dasharray: 3 3; }
    .m-cv { font: 700 20px 'Segoe UI', Ubuntu, sans-serif; fill: #1f2328; }
    .m-cl { font: 600 9px 'Segoe UI', Ubuntu, sans-serif; fill: #656d76; letter-spacing: 1px; }
    .m-peak { font: 600 11px 'Segoe UI', Ubuntu, sans-serif; fill: #1f2328; }
    .m-bar { transform-box: fill-box; transform-origin: bottom; transform: scaleY(0);
             animation: grow .6s cubic-bezier(.34,1.35,.44,1) both; }
    #m-nowGlow { opacity: .2; animation: breathe 2.8s ease-in-out infinite alternate; }
    #m-ping { transform-box: fill-box; transform-origin: center; animation: ping 2.6s ease-out infinite; }
    #m-shine { animation: sweep 7s linear 2.8s infinite; }
    
    .fade { opacity: 0; animation: fadein .5s ease-out forwards; }
    .chip { opacity: 0; animation: rise .5s ease-out both; }
    .late { opacity: 0; animation: fadein .45s ease-out 1.5s forwards; }
    @keyframes fadein { to { opacity: 1; } }
    @keyframes grow { from { transform: scaleY(0); } to { transform: scaleY(1); } }
    @keyframes rise { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes breathe { from { opacity: .15; } to { opacity: .5; } }
    @keyframes ping { 0% { transform: scale(.5); opacity: .8; } 55% { transform: scale(2.4); opacity: 0; } 100% { transform: scale(2.4); opacity: 0; } }
    @keyframes sweep { 0% { transform: translateX(0) skewX(-14deg); } 22% { transform: translateX(1115px) skewX(-14deg); } 100% { transform: translateX(1115px) skewX(-14deg); } }
  
    @media (prefers-reduced-motion: reduce) {
      .fade, .m-bar, .chip, .late { animation: none; opacity: 1; transform: none; }
      #m-nowGlow { animation: none; opacity: .3; }
      #m-ping, #m-shine { animation: none; display: none; }
    }
  </style>
