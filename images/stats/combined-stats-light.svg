<svg width="955" height="195" viewBox="0 0 955 195" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="GitHub stats: 5 105 stars, 12 556 commits, rank S+. 13 174 contributions, current streak 1 days.">
  <style>
    .cs-lab { font: 400 12.5px 'Segoe UI', Ubuntu, sans-serif; fill: #656d76; }
    .cs-val { font: 600 14px 'Segoe UI', Ubuntu, sans-serif; fill: #1f2328; }
    .cs-big { font: 700 28px 'Segoe UI', Ubuntu, sans-serif; fill: #1f2328; }
    .cs-rank { font: 700 24px 'Segoe UI', Ubuntu, sans-serif; fill: #1f2328; }
    .cs-cap { font: 600 9px 'Segoe UI', Ubuntu, sans-serif; fill: #656d76; letter-spacing: 1.4px; }
    .cs-sub { font: 400 13px 'Segoe UI', Ubuntu, sans-serif; fill: #656d76; }
    .cs-date { font: 400 11px 'Segoe UI', Ubuntu, sans-serif; fill: #656d76; }
    .cs-cur { font: 700 13.5px 'Segoe UI', Ubuntu, sans-serif; fill: #0969da; }
    .cs-fade { opacity: 0; animation: cs-fadein .5s ease-out forwards; }
    .cs-row { opacity: 0; animation: cs-fadein .45s ease-out both; }
    .cs-bar { transform: scaleX(0); transform-box: fill-box; transform-origin: left;
              animation: cs-grow .8s cubic-bezier(.33,1,.4,1) both; }
    .cs-ringL { stroke-dasharray: 276.46; stroke-dashoffset: 276.46;
                animation: cs-drawL 1.2s cubic-bezier(.33,1,.4,1) .5s both; }
    .cs-ringR { stroke-dasharray: 251.33; stroke-dashoffset: 251.33;
                animation: cs-drawR 1.2s cubic-bezier(.33,1,.4,1) .6s both; }
    .cs-spark { opacity: 0; animation: cs-fadein 1s ease-out .9s forwards; }
    .cs-halo { animation: cs-breathe 4.5s ease-in-out infinite alternate; }
    .cs-flame { animation: cs-flick 2.8s ease-in-out infinite; }
    .cs-e1 { opacity: 0; animation: cs-blink 2.4s ease-in-out .2s infinite; }
    .cs-e2 { opacity: 0; animation: cs-blink 2.4s ease-in-out 1s infinite; }
    .cs-e3 { opacity: 0; animation: cs-blink 2.4s ease-in-out 1.8s infinite; }
    @keyframes cs-fadein { to { opacity: 1; } }
    @keyframes cs-grow { to { transform: scaleX(1); } }
    @keyframes cs-drawL { to { stroke-dashoffset: 0.00; } }
    @keyframes cs-drawR { to { stroke-dashoffset: 246.76; } }
    @keyframes cs-breathe { from { opacity: .45; } to { opacity: 1; } }
    @keyframes cs-flick { 0%, 100% { opacity: 1; } 40% { opacity: .68; } 65% { opacity: .9; } }
    @keyframes cs-blink { 0%, 100% { opacity: 0; } 50% { opacity: .85; } }
    @media (prefers-reduced-motion: reduce) {
      .cs-fade, .cs-row, .cs-spark { animation: none; opacity: 1; }
      .cs-bar { animation: none; transform: none; }
      .cs-ringL { animation: none; stroke-dashoffset: 0.00; }
      .cs-ringR { animation: none; stroke-dashoffset: 246.76; }
      .cs-halo, .cs-flame, .cs-e1, .cs-e2, .cs-e3 { animation: none; }
    }
  </style>
  <defs>
    <linearGradient id="cs-bg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0969da"/>
      <stop offset="1" stop-color="#54aeff"/>
    </linearGradient>
    <linearGradient id="cs-rg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#54aeff"/>
      <stop offset="1" stop-color="#0969da"/>
    </linearGradient>
    <linearGradient id="cs-num" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#54aeff"/>
      <stop offset="1" stop-color="#0969da"/>
    </linearGradient>
    <radialGradient id="cs-hg">
      <stop offset=".55" stop-color="#0969da" stop-opacity="0"/>
      <stop offset=".8" stop-color="#0969da" stop-opacity=".14"/>
      <stop offset="1" stop-color="#0969da" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="cs-sep" x1="0" y1="30" x2="0" y2="170" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#eaeef2" stop-opacity="0"/>
      <stop offset=".5" stop-color="#eaeef2"/>
      <stop offset="1" stop-color="#eaeef2" stop-opacity="0"/>
    </linearGradient>
    <mask id="cs-mask">
      <rect x="-55" y="-55" width="110" height="110" fill="#fff"/>
      <ellipse cy="-40" rx="13" ry="18" fill="#000"/>
    </mask>
    <clipPath id="cs-clipR"><rect x="0.5" y="0.5" rx="6" width="494" height="194"/></clipPath>
  </defs>

  <!-- LEFT CARD: metric bars + rank ring -->
  <g>
    <rect x="0.5" y="0.5" rx="6" width="449" height="194" fill="#ffffff" stroke="#d0d7de"/>
    
    <g class="cs-row" style="animation-delay:150ms">
      <text class="cs-lab" x="25" y="36">Total Stars</text>
      <text class="cs-val" x="300" y="37" text-anchor="end">5 105</text>
      <rect x="25" y="44" width="275" height="4" rx="2" fill="#eaeef2"/>
      <rect class="cs-bar" style="animation-delay:250ms" x="25" y="44" width="249" height="4" rx="2" fill="url(#cs-bg)"/>
    </g>
    <g class="cs-row" style="animation-delay:260ms">
      <text class="cs-lab" x="25" y="68">Total Commits</text>
      <text class="cs-val" x="300" y="69" text-anchor="end">12 556</text>
      <rect x="25" y="76" width="275" height="4" rx="2" fill="#eaeef2"/>
      <rect class="cs-bar" style="animation-delay:360ms" x="25" y="76" width="275" height="4" rx="2" fill="url(#cs-bg)"/>
    </g>
    <g class="cs-row" style="animation-delay:370ms">
      <text class="cs-lab" x="25" y="100">Total PRs</text>
      <text class="cs-val" x="300" y="101" text-anchor="end">1 767</text>
      <rect x="25" y="108" width="275" height="4" rx="2" fill="#eaeef2"/>
      <rect class="cs-bar" style="animation-delay:470ms" x="25" y="108" width="218" height="4" rx="2" fill="url(#cs-bg)"/>
    </g>
    <g class="cs-row" style="animation-delay:480ms">
      <text class="cs-lab" x="25" y="132">Total Issues</text>
      <text class="cs-val" x="300" y="133" text-anchor="end">732</text>
      <rect x="25" y="140" width="275" height="4" rx="2" fill="#eaeef2"/>
      <rect class="cs-bar" style="animation-delay:580ms" x="25" y="140" width="192" height="4" rx="2" fill="url(#cs-bg)"/>
    </g>
    <g class="cs-row" style="animation-delay:590ms">
      <text class="cs-lab" x="25" y="164">Followers</text>
      <text class="cs-val" x="300" y="165" text-anchor="end">412</text>
      <rect x="25" y="172" width="275" height="4" rx="2" fill="#eaeef2"/>
      <rect class="cs-bar" style="animation-delay:690ms" x="25" y="172" width="176" height="4" rx="2" fill="url(#cs-bg)"/>
    </g>
    <g transform="translate(382,92)">
      <circle class="cs-halo" r="57" fill="url(#cs-hg)"/>
      <circle r="44" stroke="#eaeef2" stroke-width="6" fill="none"/>
      <circle class="cs-ringL" r="44" stroke="url(#cs-rg)" stroke-width="6" fill="none" stroke-linecap="round" transform="rotate(-90)"/>
      <text class="cs-rank cs-fade" style="animation-delay:.9s" y="9" text-anchor="middle">S+</text>
    </g>
    <text class="cs-cap cs-fade" style="animation-delay:1.1s" x="382" y="162" text-anchor="middle">TOP 1%</text>
  </g>

  <!-- RIGHT CARD: contributions + streak -->
  <g transform="translate(460,0)">
    <rect x="0.5" y="0.5" rx="6" width="494" height="194" fill="#ffffff" stroke="#d0d7de"/>
    <g class="cs-spark" clip-path="url(#cs-clipR)">
      <path d="M1.0,189.1 L38.9,186.9 L76.8,189.2 L114.8,171.5 L152.7,175.8 L190.6,133.5 L228.5,155.5 L266.5,180.4 L304.4,168.9 L342.3,153.0 L380.2,144.8 L418.2,159.5 L456.1,139.7 L494.0,132.0 L494,194 L1,194 Z" fill="#0969da" opacity=".06"/>
      <path d="M1.0,189.1 L38.9,186.9 L76.8,189.2 L114.8,171.5 L152.7,175.8 L190.6,133.5 L228.5,155.5 L266.5,180.4 L304.4,168.9 L342.3,153.0 L380.2,144.8 L418.2,159.5 L456.1,139.7 L494.0,132.0" stroke="#0969da" stroke-width="1.5" fill="none" opacity=".3"/>
    </g>
    <line x1="165" y1="30" x2="165" y2="170" stroke="url(#cs-sep)"/>
    <line x1="330" y1="30" x2="330" y2="170" stroke="url(#cs-sep)"/>
    <g class="cs-row" style="animation-delay:250ms">
      <text class="cs-big" x="82.5" y="86" text-anchor="middle">13 174</text>
      <text class="cs-sub" x="82.5" y="114" text-anchor="middle">Total Contributions</text>
      <text class="cs-date" x="82.5" y="136" text-anchor="middle">Jan 1 - Present</text>
    </g>
    <g class="cs-row" style="animation-delay:400ms">
      <g transform="translate(247.5,78)">
        <circle class="cs-halo" r="52" fill="url(#cs-hg)" style="animation-delay:1.2s"/>
        <g mask="url(#cs-mask)">
          <circle r="40" stroke="#eaeef2" stroke-width="5" fill="none"/>
          <circle class="cs-ringR" r="40" stroke="url(#cs-rg)" stroke-width="5" fill="none" stroke-linecap="round" transform="rotate(-90)"/>
        </g>
        <g class="cs-flame" transform="translate(0,-52)">
          <path d="M 1.5 0.67 C 1.5 0.67 2.24 3.32 2.24 5.47 C 2.24 7.53 0.89 9.2 -1.17 9.2 C -3.23 9.2 -4.79 7.53 -4.79 5.47 L -4.76 5.11 C -6.78 7.51 -8 10.62 -8 13.99 C -8 18.41 -4.42 22 0 22 C 4.42 22 8 18.41 8 13.99 C 8 8.6 5.41 3.79 1.5 0.67 Z M -0.29 19 C -2.07 19 -3.51 17.6 -3.51 15.86 C -3.51 14.24 -2.46 13.1 -0.7 12.74 C 1.07 12.38 2.9 11.53 3.92 10.16 C 4.31 11.45 4.51 12.81 4.51 14.2 C 4.51 16.85 2.36 19 -0.29 19 Z" fill="#0969da"/>
        </g>
        <circle class="cs-e1" cx="-9" cy="-57" r="1.6" fill="#54aeff"/>
        <circle class="cs-e2" cx="2" cy="-63" r="1.4" fill="#54aeff"/>
        <circle class="cs-e3" cx="10" cy="-55" r="1.6" fill="#54aeff"/>
        <text class="cs-big" y="10" text-anchor="middle" fill="url(#cs-num)">1</text>
      </g>
      <text class="cs-cur" x="247.5" y="150" text-anchor="middle">Current Streak</text>
      <text class="cs-date" x="247.5" y="170" text-anchor="middle">Dec 31 - Dec 31</text>
    </g>
    <g class="cs-row" style="animation-delay:550ms">
      <text class="cs-big" x="412.5" y="86" text-anchor="middle">55</text>
      <text class="cs-sub" x="412.5" y="114" text-anchor="middle">Longest Streak</text>
      <text class="cs-date" x="412.5" y="136" text-anchor="middle">Jul 13 - Sep 5</text>
    </g>
  </g>
</svg>